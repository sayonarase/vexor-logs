# Vexor Logs default Fluent Bit configuration.
# Reads /etc/vexor/logs.env for VEXOR_LOGS_URL and host metadata.
[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name   tail
    Path   /var/log/messages,/var/log/secure
    Tag    host.*
    Refresh_Interval 5

[INPUT]
    Name   systemd
    Tag    journald.*
    Read_From_Tail On

[FILTER]
    Name   modify
    Match  *
    Add    host ${HOSTNAME}

[OUTPUT]
    Name   loki
    Match  *
    Host   ${VEXOR_LOGS_HOST}
    Port   ${VEXOR_LOGS_PORT}
    Labels job=fluentbit, host=$host
    Auto_Kubernetes_Labels off
