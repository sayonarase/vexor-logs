# Vexor Logs default Vector configuration.
data_dir = "/var/lib/vector"

[sources.host_files]
type = "file"
include = ["/var/log/messages", "/var/log/secure", "/var/log/audit/audit.log"]
ignore_older_secs = 86400
read_from = "end"

[sources.journald]
type = "journald"
current_boot_only = true

[transforms.tag]
type = "remap"
inputs = ["host_files", "journald"]
source = '''
.host = get_hostname() ?? get_env_var("HOSTNAME") ?? "unknown"
if exists(.SYSTEMD_UNIT) {
  .service = .SYSTEMD_UNIT
} else if exists(.file) {
  .service = .file
} else {
  .service = "unknown"
}
if exists(.message) {
  ._msg = del(.message)
} else if exists(.MESSAGE) {
  ._msg = .MESSAGE
} else {
  ._msg = ""
}
'''

[sinks.victorialogs]
type = "loki"
inputs = ["tag"]
endpoint = "${VEXOR_LOGS_URL:-http://127.0.0.1:9428}/insert"
encoding.codec = "json"
compression = "none"
labels = { host = "{{ host }}", service = "{{ service }}" }
out_of_order_action = "accept"
